name: release-bar

on:
  push:
    tags:
      - "bar-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Regenerate prompt grammar
        run: |
          set -euo pipefail
          python3 -m prompts.export --output /tmp/grammar-regen.json
          python3 scripts/check_grammar_sync.py /tmp/grammar-regen.json build/prompt-grammar.json
          python3 scripts/check_grammar_sync.py /tmp/grammar-regen.json internal/barcli/embed/prompt-grammar.json

      - name: Build release archives
        id: build
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#bar-v}"
          mkdir -p dist
          for GOOS in linux darwin; do
            case "$GOOS" in
              linux) GOARCHES="amd64" ;;
              darwin) GOARCHES="amd64 arm64" ;;
            esac
            for GOARCH in $GOARCHES; do
              echo "Building bar for ${GOOS}/${GOARCH}"
              OUTPUT_DIR="dist/${GOOS}_${GOARCH}"
              mkdir -p "${OUTPUT_DIR}"
              GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w -X main.barVersion=${VERSION}" -o "${OUTPUT_DIR}/bar" ./cmd/bar
              ARCHIVE="dist/bar_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
              tar -czf "${ARCHIVE}" -C "${OUTPUT_DIR}" bar
              rm -rf "${OUTPUT_DIR}"
            done
          done
          (cd dist && sha256sum bar_${VERSION}_*.tar.gz > checksums.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bar_${{ steps.build.outputs.version }}_linux_amd64.tar.gz
            dist/bar_${{ steps.build.outputs.version }}_linux_arm64.tar.gz
            dist/bar_${{ steps.build.outputs.version }}_darwin_amd64.tar.gz
            dist/bar_${{ steps.build.outputs.version }}_darwin_arm64.tar.gz
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
