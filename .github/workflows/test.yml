name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ./.tests/requirements-dev.txt

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install Python dependencies
        run: python3 -m pip install -r ./.github/requirements-test.txt

      - name: Regenerate prompt grammar artifacts
        run: python3 -m prompts.export --output /tmp/grammar-regen.json

      - name: Verify prompt grammar artifact cleanliness
        run: python3 scripts/check_grammar_sync.py /tmp/grammar-regen.json build/prompt-grammar.json

      - name: Verify grammar sync across all copies
        run: |
          for copy in internal/barcli/embed/prompt-grammar.json cmd/bar/testdata/grammar.json web/static/prompt-grammar.json; do
            python3 scripts/check_grammar_sync.py /tmp/grammar-regen.json "$copy"
          done

      - name: Run Go tests
        run: go test ./... -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm install

      - name: Run web tests
        run: cd web && npm test

      - name: Run guardrails
        run: make ci-guardrails

      - name: Run tests
        run: python3 -m pytest tests/ -v

      - name: Install ast-grep
        run: npm install -g @ast-grep/cli

      - name: Run axis import guard
        run: make axis-import-guard
