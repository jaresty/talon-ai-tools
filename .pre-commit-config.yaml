# Pre-commit hooks configuration
# Install with: pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=100']
        description: 'Prevent accidentally committed binaries (>100KB)'
      - id: check-json
        description: 'Validate JSON files'
      - id: check-yaml
        description: 'Validate YAML files'
      - id: end-of-file-fixer
        description: 'Ensure files end with newline'
      - id: trailing-whitespace
        description: 'Remove trailing whitespace'
      - id: mixed-line-ending
        args: ['--fix=lf']
        description: 'Normalize line endings to LF'

  - repo: local
    hooks:
      - id: pre-commit-autofix
        name: Auto-fix generated files (axis config + grammar)
        language: system
        entry: make pre-commit-autofix
        pass_filenames: false
        files: ^(lib/|prompts/|internal/barcli/embed/).*$
      - id: axis-token-metadata
        name: Axis token metadata coverage
        language: system
        entry: python3 -m pytest _tests/test_axis_token_metadata.py -q --tb=short
        pass_filenames: false
        files: ^lib/.*$
